<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姫川あいり - あなたを癒す電子の妖精</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Helvetica Neue', system-ui, sans-serif; }
    .hero-bg {
      background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
    }
    .fairy-glow {
      text-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
    }
  </style>
</head>
<body class="bg-white text-gray-800">

  <!-- ヒーロー -->
  <section class="hero-bg min-h-screen flex items-center justify-center text-center px-6">
    <div class="max-w-2xl">
      <div class="mb-8">
        <!-- ここに立ち絵やロゴを入れる -->
        <div class="w-48 h-48 mx-auto bg-pink-200 rounded-full flex items-center justify-center text-6xl mb-6 border-4 border-white shadow-xl">
          ✨
        </div>
      </div>
      <h1 class="text-5xl md:text-6xl font-bold text-pink-500 fairy-glow mb-4">姫川あいり</h1>
      <p class="text-2xl md:text-3xl text-pink-400 font-light mb-10">あなたを癒す電子の妖精</p>
      <a href="#contact" 
         class="inline-block bg-pink-400 hover:bg-pink-500 text-white px-10 py-4 rounded-full text-lg font-medium transition-all shadow-lg">
        お問い合わせはこちら
      </a>
    </div>
  </section>

  <!-- プロフィール -->
  <section class="py-20 bg-white">
    <div class="max-w-3xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-12">Profile</h2>
      <p class="text-lg leading-relaxed text-gray-600 text-center">
        ここに自己紹介文を入れてください（後で簡単に編集できます）
      </p>
    </div>
  </section>

  <!-- 経歴 -->
  <section class="py-20 bg-pink-50">
    <div class="max-w-3xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-12">経歴</h2>
      <div class="space-y-8">
        <!-- 経歴をここに追加（例） -->
        <div class="flex gap-6">
          <div class="w-24 text-right text-pink-400 font-medium">2025 -</div>
          <div>声優活動開始 / VTuberデビュー</div>
        </div>
        <!-- 他の経歴も同じ形式で追加 -->
      </div>
    </div>
  </section>

  <!-- SNS -->
  <section class="py-20 bg-white">
    <div class="max-w-3xl mx-auto px-6 text-center">
      <h2 class="text-3xl font-bold text-pink-500 mb-10">Follow Me</h2>
      <div class="flex justify-center gap-8 text-4xl text-pink-400">
        <!-- SNSアイコンを追加 -->
        <a href="#" class="hover:text-pink-500 transition-colors"><i class="fab fa-twitter"></i></a>
        <a href="#" class="hover:text-pink-500 transition-colors"><i class="fab fa-youtube"></i></a>
        <a href="#" class="hover:text-pink-500 transition-colors"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
  </section>

  <!-- お問い合わせ -->
  <section id="contact" class="py-20 bg-pink-50">
    <div class="max-w-2xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-12">お問い合わせ</h2>
      <form action="https://formspree.io/f/あなたのID" method="POST" class="space-y-6">
        <input type="text" name="name" placeholder="お名前" required
               class="w-full px-6 py-4 rounded-2xl border border-pink-200 focus:border-pink-400 outline-none">
        <input type="email" name="email" placeholder="メールアドレス" required
               class="w-full px-6 py-4 rounded-2xl border border-pink-200 focus:border-pink-400 outline-none">
        <textarea name="message" placeholder="お問い合わせ内容" rows="6" required
                  class="w-full px-6 py-4 rounded-3xl border border-pink-200 focus:border-pink-400 outline-none"></textarea>
        <button type="submit"
                class="w-full bg-pink-400 hover:bg-pink-500 text-white py-5 rounded-2xl font-medium text-lg transition-all">
          送信する
        </button>
      </form>
    </div>
  </section>

  <footer class="bg-pink-100 py-10 text-center text-pink-400 text-sm">
    © 2026 姫川あいり All Rights Reserved.
  </footer>

</body>
</html>
