<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姫川あいり - あなたを癒す電子の妖精</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Helvetica Neue', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%); }
    .fairy-glow { text-shadow: 0 0 25px rgba(236, 72, 153, 0.6); }
    nav { position: sticky; top: 0; z-index: 50; }
  </style>
</head>
<body class="bg-white text-gray-800">

  <!-- ナビゲーション（上部固定タブ） -->
  <nav class="bg-white/80 backdrop-blur-md border-b border-pink-100">
    <div class="max-w-5xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="text-xl font-bold text-pink-500">姫川あいり</div>
        <div class="flex gap-8 text-sm font-medium">
          <a href="#profile" class="hover:text-pink-500 transition-colors">プロフィール</a>
          <a href="#career" class="hover:text-pink-500 transition-colors">経歴</a>
          <a href="#sns" class="hover:text-pink-500 transition-colors">SNS</a>
          <a href="#contact" class="hover:text-pink-500 transition-colors">お問い合わせ</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ヒーロー -->
  <section class="hero-bg min-h-screen flex items-center justify-center text-center px-6">
    <div class="max-w-2xl">
      <div class="mb-8">
        <div class="w-52 h-52 mx-auto bg-pink-200 rounded-full flex items-center justify-center text-7xl mb-6 border-8 border-white shadow-2xl">
          ✨
        </div>
      </div>
      <h1 class="text-5xl md:text-6xl font-bold text-pink-500 fairy-glow mb-4">姫川あいり</h1>
      <p class="text-2xl md:text-3xl text-pink-400 font-light">あなたを癒す電子の妖精</p>
    </div>
  </section>

  <!-- プロフィール -->
  <section id="profile" class="py-24 bg-white">
    <div class="max-w-3xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-10">Profile</h2>
      <p class="text-lg leading-relaxed text-gray-600 text-center">
        ここに自己紹介文を入れてください
      </p>
    </div>
  </section>

  <!-- 経歴 -->
  <section id="career" class="py-24 bg-pink-50">
    <div class="max-w-3xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-12">経歴</h2>
      <div class="space-y-10">
        <!-- ここに経歴を追加 -->
      </div>
    </div>
  </section>

  <!-- SNS -->
  <section id="sns" class="py-24 bg-white">
    <div class="max-w-3xl mx-auto px-6 text-center">
      <h2 class="text-3xl font-bold text-pink-500 mb-10">SNS</h2>
      <div class="flex justify-center gap-10 text-5xl text-pink-400">
        <!-- SNSリンクをここに入れる -->
      </div>
    </div>
  </section>

  <!-- お問い合わせ -->
  <section id="contact" class="py-24 bg-pink-50">
    <div class="max-w-2xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center text-pink-500 mb-12">お問い合わせ</h2>
      <form action="https://formspree.io/f/あなたのID" method="POST" class="space-y-6">
        <input type="text" name="name" placeholder="お名前" required class="w-full px-6 py-4 rounded-2xl border border-pink-200 focus:border-pink-400 outline-none">
        <input type="email" name="email" placeholder="メールアドレス" required class="w-full px-6 py-4 rounded-2xl border border-pink-200 focus:border-pink-400 outline-none">
        <textarea name="message" placeholder="お問い合わせ内容" rows="6" required class="w-full px-6 py-4 rounded-3xl border border-pink-200 focus:border-pink-400 outline-none"></textarea>
        <button type="submit" class="w-full bg-pink-400 hover:bg-pink-500 text-white py-5 rounded-2xl font-medium text-lg transition-all">
          送信する
        </button>
      </form>
    </div>
  </section>

  <footer class="bg-pink-100 py-10 text-center text-pink-400 text-sm">
    © 2026 姫川あいり All Rights Reserved.
  </footer>

</body>
</html>
